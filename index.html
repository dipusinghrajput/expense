<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="X-Frame-Options" content="DENY">
 <meta http-equiv="Content-Security-Policy" content="script-src 'self' 'unsafe-inline' https://*.gstatic.com https://*.googleapis.com https://apis.google.com;">
  <title>FinTrack – Login</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #0d0e14;
      --surface: #ffffff;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #4f46e5;
      --primary-dark: #3730a3;
      --danger: #ef4444;
      --success: #10b981;
      --google: #db4437;
      --radius: 14px;
      --shadow: 0 20px 60px rgba(0,0,0,0.10);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #eef2ff 0%, #f0fdf4 50%, #fdf4ff 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      background: var(--surface);
      border-radius: 24px;
      box-shadow: var(--shadow);
      padding: clamp(28px, 5vw, 48px);
      width: 100%;
      max-width: 420px;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, var(--primary), #8b5cf6, var(--success));
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }

    .logo-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--primary), #8b5cf6);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-size: 18px;
    }

    .logo-text {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--ink);
    }

    h2 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 6px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 28px;
    }

    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 6px;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 13px 16px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 0.95rem;
      color: var(--ink);
      background: #fafafa;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(79,70,229,0.12);
      background: white;
    }

    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: var(--radius);
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.2s;
      margin-top: 8px;
    }

    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-primary {
      background: linear-gradient(135deg, var(--primary), #7c3aed);
      color: white;
      box-shadow: 0 4px 14px rgba(79,70,229,0.35);
    }

    .btn-primary:hover:not(:disabled) { box-shadow: 0 6px 20px rgba(79,70,229,0.45); }

    .btn-google {
      background: white;
      color: var(--ink);
      border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center; gap: 10px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .btn-google:hover:not(:disabled) { background: #fafafa; }

    .btn-google svg { width: 20px; height: 20px; }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 16px 0;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .divider::before, .divider::after {
      content: ''; flex: 1;
      height: 1px; background: var(--border);
    }

    .toggle-row {
      text-align: center;
      margin-top: 20px;
      font-size: 0.875rem;
      color: var(--muted);
    }

    .toggle-row a {
      color: var(--primary);
      font-weight: 600;
      text-decoration: none;
    }

    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 16px;
      display: none;
    }

    .alert-error { background: #fef2f2; color: var(--danger); border: 1px solid #fecaca; }
    .alert-success { background: #ecfdf5; color: var(--success); border: 1px solid #a7f3d0; }

    .rate-warning {
      background: #fffbeb; color: #b45309;
      border: 1px solid #fde68a;
      padding: 10px 14px; border-radius: 10px;
      font-size: 0.82rem; font-weight: 500;
      margin-bottom: 14px; display: none;
    }

    @media (max-width: 480px) {
      body { padding: 12px; align-items: flex-start; padding-top: 32px; }
      .card { border-radius: 18px; }
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-icon">₹</div>
    <span class="logo-text">FinTrack</span>
  </div>

  <h2 id="form-title">Welcome back</h2>
  <p class="subtitle" id="form-subtitle">Sign in to manage your finances</p>

  <div class="rate-warning" id="rateWarning"></div>
  <div class="alert alert-error" id="errorAlert"></div>
  <div class="alert alert-success" id="successAlert"></div>

  <div class="field">
    <label for="email">Email address</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email" maxlength="254" />
  </div>

  <div class="field">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" maxlength="128" />
  </div>

  <button class="btn btn-primary" id="login-btn">Sign In</button>
  <button class="btn btn-primary" id="signup-btn" style="display:none;">Create Account</button>

  <div class="divider">or</div>

  <button class="btn btn-google" id="google-btn">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continue with Google
  </button>

  <div class="toggle-row">
    <span id="toggle-text">Don't have an account?</span>
    <a href="#" id="toggle-link"> Sign up</a>
  </div>
</div>

<!-- Firebase SDKs -->
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore-compat.js"></script>

<script>
(function() {
  'use strict';

  /* ─── SECURITY: Rate Limiter ─────────────────────────────── */
  const RateLimiter = {
    MAX_ATTEMPTS: 5,
    WINDOW_MS: 15 * 60 * 1000, // 15 minutes

    getKey(action) { return `rl_${action}`; },

    getState(action) {
      try {
        const raw = sessionStorage.getItem(this.getKey(action));
        return raw ? JSON.parse(raw) : { count: 0, firstAt: Date.now() };
      } catch { return { count: 0, firstAt: Date.now() }; }
    },

    check(action) {
      const state = this.getState(action);
      const now = Date.now();
      if (now - state.firstAt > this.WINDOW_MS) {
        sessionStorage.removeItem(this.getKey(action));
        return { allowed: true, remaining: this.MAX_ATTEMPTS };
      }
      if (state.count >= this.MAX_ATTEMPTS) {
        const waitSec = Math.ceil((this.WINDOW_MS - (now - state.firstAt)) / 1000);
        return { allowed: false, waitSec };
      }
      return { allowed: true, remaining: this.MAX_ATTEMPTS - state.count };
    },

    record(action) {
      const state = this.getState(action);
      const now = Date.now();
      if (now - state.firstAt > this.WINDOW_MS) {
        sessionStorage.setItem(this.getKey(action), JSON.stringify({ count: 1, firstAt: now }));
      } else {
        state.count++;
        sessionStorage.setItem(this.getKey(action), JSON.stringify(state));
      }
    },

    reset(action) { sessionStorage.removeItem(this.getKey(action)); }
  };

  /* ─── SECURITY: Input Sanitizer ─────────────────────────── */
  const Sanitizer = {
    email(val) {
      if (typeof val !== 'string') return '';
      val = val.trim().toLowerCase();
      if (val.length > 254) return '';
      const emailRe = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      return emailRe.test(val) ? val : '';
    },
    password(val) {
      if (typeof val !== 'string') return '';
      if (val.length < 6 || val.length > 128) return '';
      return val;
    }
  };

  /* ─── Firebase Config (public – safe for frontend) ───────── */
  const firebaseConfig = {
    apiKey: "AIzaSyAxL-f1ThdimBKBWEn_83zIwr1wn-EZ3Tk",
    authDomain: "reser-323b6.firebaseapp.com",
    projectId: "reser-323b6",
    storageBucket: "reser-323b6.appspot.com",
    messagingSenderId: "587671271436",
    appId: "1:587671271436:web:38e6f1928eebc799925629"
  };

  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  /* ─── UI refs ─────────────────────────────────────────────── */
  const emailInput    = document.getElementById('email');
  const passInput     = document.getElementById('password');
  const loginBtn      = document.getElementById('login-btn');
  const signupBtn     = document.getElementById('signup-btn');
  const googleBtn     = document.getElementById('google-btn');
  const toggleLink    = document.getElementById('toggle-link');
  const toggleText    = document.getElementById('toggle-text');
  const formTitle     = document.getElementById('form-title');
  const formSubtitle  = document.getElementById('form-subtitle');
  const errorAlert    = document.getElementById('errorAlert');
  const successAlert  = document.getElementById('successAlert');
  const rateWarning   = document.getElementById('rateWarning');

  let isLogin = true;

  function showError(msg) {
    errorAlert.textContent = msg;
    errorAlert.style.display = 'block';
    successAlert.style.display = 'none';
  }

  function showSuccess(msg) {
    successAlert.textContent = msg;
    successAlert.style.display = 'block';
    errorAlert.style.display = 'none';
  }

  function clearAlerts() {
    errorAlert.style.display = 'none';
    successAlert.style.display = 'none';
    rateWarning.style.display = 'none';
  }

  function setLoading(btn, loading) {
    btn.disabled = loading;
    btn.textContent = loading ? 'Please wait…' : (isLogin ? 'Sign In' : 'Create Account');
  }

  function mapFirebaseError(code) {
    const map = {
      'auth/wrong-password': 'Incorrect password. Please try again.',
      'auth/user-not-found': 'No account found with this email.',
      'auth/email-already-in-use': 'This email is already registered.',
      'auth/invalid-email': 'Please enter a valid email address.',
      'auth/weak-password': 'Password must be at least 6 characters.',
      'auth/too-many-requests': 'Too many attempts. Please try again later.',
      'auth/network-request-failed': 'Network error. Check your connection.',
      'auth/popup-closed-by-user': 'Sign-in popup was closed.',
    };
    return map[code] || 'Authentication failed. Please try again.';
  }

  async function ensureUserDoc(user) {
    const ref = db.collection('users').doc(user.uid);
    const snap = await ref.get();
    if (!snap.exists) {
      await ref.set({
        email: user.email,
        displayName: user.displayName || '',
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    }
  }

  /* ─── Toggle login/signup ─────────────────────────────────── */
  toggleLink.addEventListener('click', (e) => {
    e.preventDefault();
    clearAlerts();
    isLogin = !isLogin;
    if (isLogin) {
      formTitle.textContent = 'Welcome back';
      formSubtitle.textContent = 'Sign in to manage your finances';
      loginBtn.style.display = 'block';
      signupBtn.style.display = 'none';
      toggleText.textContent = "Don't have an account?";
      toggleLink.textContent = ' Sign up';
    } else {
      formTitle.textContent = 'Create account';
      formSubtitle.textContent = 'Start tracking your finances today';
      loginBtn.style.display = 'none';
      signupBtn.style.display = 'block';
      toggleText.textContent = 'Already have an account?';
      toggleLink.textContent = ' Sign in';
    }
  });

  /* ─── Email Login ─────────────────────────────────────────── */
  loginBtn.addEventListener('click', async () => {
    clearAlerts();
    const rl = RateLimiter.check('email_login');
    if (!rl.allowed) {
      rateWarning.textContent = `Too many attempts. Try again in ${Math.ceil(rl.waitSec / 60)} min.`;
      rateWarning.style.display = 'block';
      return;
    }

    const email    = Sanitizer.email(emailInput.value);
    const password = Sanitizer.password(passInput.value);

    if (!email)    { showError('Please enter a valid email address.'); return; }
    if (!password) { showError('Password must be 6–128 characters.'); return; }

    setLoading(loginBtn, true);
    RateLimiter.record('email_login');

    try {
      await auth.signInWithEmailAndPassword(email, password);
      RateLimiter.reset('email_login');
      window.location.href = 'expense_tracker.html';
    } catch (err) {
      showError(mapFirebaseError(err.code));
    } finally {
      setLoading(loginBtn, false);
    }
  });

  /* ─── Email Signup ────────────────────────────────────────── */
  signupBtn.addEventListener('click', async () => {
    clearAlerts();
    const rl = RateLimiter.check('email_signup');
    if (!rl.allowed) {
      rateWarning.textContent = `Too many attempts. Try again in ${Math.ceil(rl.waitSec / 60)} min.`;
      rateWarning.style.display = 'block';
      return;
    }

    const email    = Sanitizer.email(emailInput.value);
    const password = Sanitizer.password(passInput.value);

    if (!email)    { showError('Please enter a valid email address.'); return; }
    if (!password) { showError('Password must be 6–128 characters.'); return; }

    signupBtn.disabled = true;
    signupBtn.textContent = 'Creating account…';
    RateLimiter.record('email_signup');

    try {
      const result = await auth.createUserWithEmailAndPassword(email, password);
      await ensureUserDoc(result.user);
      RateLimiter.reset('email_signup');
      window.location.href = 'expense_tracker.html';
    } catch (err) {
      showError(mapFirebaseError(err.code));
    } finally {
      signupBtn.disabled = false;
      signupBtn.textContent = 'Create Account';
    }
  });

  /* ─── Google Sign-In ──────────────────────────────────────── */
  googleBtn.addEventListener('click', async () => {
  clearAlerts();

  const provider = new firebase.auth.GoogleAuthProvider();

  try {
    await auth.signInWithRedirect(provider);
  } catch (err) {
    showError(mapFirebaseError(err.code));
  }
});

    try {
      const provider = new firebase.auth.GoogleAuthProvider();
      await auth.signInWithRedirect(provider);
      await ensureUserDoc(result.user);
      RateLimiter.reset('google_auth');
      window.location.href = 'expense_tracker.html';
    } catch (err) {
      showError(mapFirebaseError(err.code));
    } finally {
      googleBtn.disabled = false;
    }
  });

  /* ─── Auto-redirect if already logged in ─────────────────── */
  auth.onAuthStateChanged(user => {
    if (user) window.location.href = 'expense_tracker.html';
  });

  /* ─── Enter key support ───────────────────────────────────── */
  [emailInput, passInput].forEach(el => {
    el.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        isLogin ? loginBtn.click() : signupBtn.click();
      }
    });
  });
})();
</script>
</body>
</html>
